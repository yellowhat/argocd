apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  name: manifests
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/yellowhat/argocd"
    path: manifests
    targetRevision: HEAD
  destination:
    namespace: metallb
    server: "https://kubernetes.default.svc"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
